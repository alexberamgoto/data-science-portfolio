version: '3.8'

# ═══════════════════════════════════════════════════════════════
# Architecture Big Data - Social Media Events Analysis
# HDFS (1 NameNode + 1 SecondaryNameNode + 2 DataNodes)
# Spark (1 Master + 2 Workers)
# Kafka (1 Broker + Zookeeper)
# ═══════════════════════════════════════════════════════════════

services:

  # ─────────────────────────────────────────
  # HDFS CLUSTER
  # ─────────────────────────────────────────

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    ports:
      - "9870:9870"   # Web UI HDFS
      - "9000:9000"   # HDFS RPC
    environment:
      - CLUSTER_NAME=social-media-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_replication=2
      - HDFS_CONF_dfs_namenode_datanode_registration_ip___hostname___check=false
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./data:/data
    networks:
      - bigdata-net

  secondarynamenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: secondarynamenode
    hostname: secondarynamenode
    environment:
      - CLUSTER_NAME=social-media-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_namenode_secondary_http___address=secondarynamenode:9868
    depends_on:
      - namenode
    networks:
      - bigdata-net

  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode1
    hostname: datanode1
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=2
    depends_on:
      - namenode
    volumes:
      - datanode1_data:/hadoop/dfs/data
    networks:
      - bigdata-net

  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode2
    hostname: datanode2
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=2
    depends_on:
      - namenode
    volumes:
      - datanode2_data:/hadoop/dfs/data
    networks:
      - bigdata-net

  # ─────────────────────────────────────────
  # SPARK CLUSTER
  # ─────────────────────────────────────────

  spark-master:
    image: bitnami/spark:3.5
    container_name: spark-master
    hostname: spark-master
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master RPC
      - "4040:4040"   # Spark Application UI
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
    volumes:
      - ./spark_jobs:/opt/spark-jobs
      - ./data:/data
    networks:
      - bigdata-net

  spark-worker-1:
    image: bitnami/spark:3.5
    container_name: spark-worker-1
    hostname: spark-worker-1
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - ./spark_jobs:/opt/spark-jobs
      - ./data:/data
    networks:
      - bigdata-net

  spark-worker-2:
    image: bitnami/spark:3.5
    container_name: spark-worker-2
    hostname: spark-worker-2
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master
    volumes:
      - ./spark_jobs:/opt/spark-jobs
      - ./data:/data
    networks:
      - bigdata-net

  # ─────────────────────────────────────────
  # KAFKA + ZOOKEEPER (pour le streaming)
  # ─────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - bigdata-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - bigdata-net

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:

networks:
  bigdata-net:
    driver: bridge
